<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AllIsMail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #F6F1E8;
      color: #1F1F1F;
    }

    .top-banner {
      background: #3B6FD8;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #F6F1E8;
    }

    .logo {
      font-weight: 500;
      font-style: italic;
      font-size: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .logo span {
      color: #3B6FD8;
    }

    .hero {
      text-align: center;
      max-width: 900px;
      margin: 90px auto 40px auto;
      padding: 0 20px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 500;
      line-height: 1.1;
    }

    .hero p {
      font-size: 18px;
      color: #555;
      display: block;
      max-width: 32rem;
      margin: 0 auto 40px;
    }

    .upload-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      max-width: 500px;
      margin: 40px auto;
    }

    .upload-box>p {
      color: #666;
      margin-top: 0;
    }

    .file-input-wrapper {
      margin-top: 20px;
      text-align: center;
    }

    .file-label {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 10px;
      background: #EFE9DF;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .file-label:hover {
      background: #e6dfd3;
    }

    input[type=file] {
      display: none;
    }

    .file-details {
      display: none;
      margin-top: 16px;
      background: #F6F1E8;
      border-radius: 10px;
      padding: 14px 16px;
      text-align: left;
      border: 1px solid #E5DFD5;
      animation: fadeSlideIn 0.25s ease;
    }

    .file-details.visible {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .file-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .file-meta {
      min-width: 0;
    }

    .file-name {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #1F1F1F;
    }

    .file-size {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .file-remove {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .file-remove:hover {
      color: #e55;
    }

    .upload-btn {
      margin-top: 20px;
      background: #3B6FD8;
      color: white;
      border: none;
      padding: 12px 26px;
      font-size: 15px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
    }

    .upload-btn:hover:not(:disabled) {
      background: #2f5ec0;
    }

    .upload-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    .upload-btn.loading .spinner {
      display: block;
    }

    .results {
      display: none;
      margin-top: 24px;
      border-top: 1px solid #EEE8DF;
      padding-top: 20px;
      animation: fadeSlideIn 0.3s ease;
    }

    .results.visible {
      display: block;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .results-title {
      font-weight: 600;
      font-size: 15px;
      text-align: left;
    }

    .results-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .action-btn {
      background: #EFE9DF;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      color: #1F1F1F;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .action-btn:hover {
      background: #e6dfd3;
    }

    .action-btn.export-btn {
      background: #3B6FD8;
      color: white;
    }

    .action-btn.export-btn:hover {
      background: #2f5ec0;
    }

    .results-search {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      border: 1px solid #E5DFD5;
      background: #F6F1E8;
      font-family: 'Inter', sans-serif;
      color: #1F1F1F;
      margin-bottom: 10px;
      outline: none;
    }

    .results-search:focus {
      border-color: #3B6FD8;
    }

    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #F0EBE3;
      font-size: 13px;
      gap: 8px;
    }

    .result-info {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
    }

    .result-name {
      font-weight: 600;
      font-size: 12px;
      color: #1F1F1F;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-email {
      color: #555;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: monospace;
    }

    .result-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .result-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-valid {
      background: #E3F5EC;
      color: #1A7A45;
    }

    .badge-invalid {
      background: #FCE8E8;
      color: #B92E2E;
    }

    .badge-risky {
      background: #FFF4E3;
      color: #A0620A;
    }

    .copy-email-btn {
      background: none;
      border: 1px solid #E5DFD5;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      color: #888;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-email-btn:hover {
      background: #EFE9DF;
      color: #1F1F1F;
      border-color: #ccc;
    }

    .copy-email-btn.copied {
      background: #E3F5EC;
      color: #1A7A45;
      border-color: #1A7A45;
    }

    .error-msg {
      display: none;
      background: #FCE8E8;
      color: #B92E2E;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      margin-top: 16px;
      text-align: left;
    }

    .error-msg.visible {
      display: block;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1F1F1F;
      color: white;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      display: none;
      z-index: 999;
      animation: fadeSlideIn 0.2s ease;
    }

    .toast.show {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
      color: #666;
      font-size: 14px;
      flex-wrap: wrap;
    }

    .feature {
      background: #EFE9DF;
      padding: 10px 16px;
      border-radius: 20px;
    }

    .footer {
      text-align: center;
      margin: 80px 0 40px 0;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header></header>

  <section class="hero">

    <div class="logo">
      📬 <span>AllIsMail</span>
    </div>

    <h1>
      Clean your email list<br>
      before you send
    </h1>

    <p>
      Upload a CSV file and AllIsMail will validate every email using syntax, MX and SMTP checks.
    </p>

    <div class="upload-box">
      <p>Upload your CSV file</p>

      <div class="file-input-wrapper">
        <label class="file-label" for="fileInput">
          📁 Choose CSV File
        </label>
        <input id="fileInput" type="file" name="file" accept=".csv">
      </div>

      <div class="file-details" id="fileDetails">
        <div class="file-icon">📄</div>
        <div class="file-meta">
          <div class="file-name" id="fileName">—</div>
          <div class="file-size" id="fileSize">—</div>
        </div>
        <button class="file-remove" id="fileRemove" title="Remove file">✕</button>
      </div>

      <button class="upload-btn" id="verifyBtn" disabled>
        <span class="spinner" id="spinner"></span>
        <span id="btnLabel">Upload & Verify</span>
      </button>

      <div class="error-msg" id="errorMsg"></div>

      <div class="results" id="results">
        <div class="results-header">
          <div class="results-title">Verification Results</div>
          <div class="results-actions">
            <button class="action-btn" id="copyAllBtn">Copy all emails</button>
            <button class="action-btn export-btn" id="exportBtn">⬇ Export CSV</button>
          </div>
        </div>
        <input class="results-search" id="resultsSearch" type="text" placeholder="Filter by name or email…">
        <div id="resultsList"></div>
      </div>

    </div>

    <div class="features">
      <div class="feature">Syntax Check</div>
      <div class="feature">MX Validation</div>
      <div class="feature">SMTP Verification</div>
    </div>

  </section>

  <div class="toast" id="toast"></div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const fileDetails = document.getElementById('fileDetails');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const fileRemove = document.getElementById('fileRemove');
    const verifyBtn = document.getElementById('verifyBtn');
    const spinner = document.getElementById('spinner');
    const btnLabel = document.getElementById('btnLabel');
    const results = document.getElementById('results');
    const resultsList = document.getElementById('resultsList');
    const errorMsg = document.getElementById('errorMsg');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const exportBtn = document.getElementById('exportBtn');
    const resultsSearch = document.getElementById('resultsSearch');
    const toast = document.getElementById('toast');

    let allRows = [];
    let toastTimer;

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      });
    }

    function csvEscape(val) {
      const str = String(val);
      return str.includes(',') || str.includes('"') || str.includes('\n')
        ? '"' + str.replace(/"/g, '""') + '"'
        : str;
    }

    function exportCsv() {
      const rows = [['Name', 'Email', 'IsValid']];
      allRows.forEach(r => {
        rows.push([csvEscape(r.name), csvEscape(r.email), r.isValid ? 'true' : 'false']);
      });
      const csvContent = rows.map(r => r.join(',')).join('\n');
      const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'allismail_results.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Exported ' + allRows.length + ' rows');
    }

    function showFile(file) {
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      fileDetails.classList.add('visible');
      verifyBtn.disabled = false;
      results.classList.remove('visible');
      errorMsg.classList.remove('visible');
      resultsList.innerHTML = '';
      resultsSearch.value = '';
      allRows = [];
    }

    function clearFile() {
      fileInput.value = '';
      fileDetails.classList.remove('visible');
      verifyBtn.disabled = true;
      results.classList.remove('visible');
      errorMsg.classList.remove('visible');
    }

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) showFile(file);
    });

    fileRemove.addEventListener('click', clearFile);

    function setLoading(on) {
      verifyBtn.disabled = on;
      verifyBtn.classList.toggle('loading', on);
      spinner.style.display = on ? 'block' : 'none';
      btnLabel.textContent = on ? 'Verifying…' : 'Upload & Verify';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
    }

    function renderRows(rows) {
      if (!rows.length) {
        resultsList.innerHTML = '<p style="color:#888;font-size:13px;text-align:left;">No results match your filter.</p>';
        return;
      }
      resultsList.innerHTML = rows.map(r => `
                <div class="result-row">
                    <div class="result-info">
                        <span class="result-name">${escapeHtml(r.name)}</span>
                        <span class="result-email">${escapeHtml(r.email)}</span>
                    </div>
                    <div class="result-actions">
                        <span class="result-badge badge-${r.status}">${capitalize(r.status)}</span>
                        <button class="copy-email-btn" data-email="${escapeHtml(r.email)}">Copy</button>
                    </div>
                </div>
            `).join('');
    }

    resultsList.addEventListener('click', e => {
      const btn = e.target.closest('.copy-email-btn');
      if (!btn) return;
      const email = btn.dataset.email;
      copyText(email);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      showToast('Copied ' + email);
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1800);
    });

    resultsSearch.addEventListener('input', () => {
      const q = resultsSearch.value.trim().toLowerCase();
      const filtered = q
        ? allRows.filter(r => r.name.toLowerCase().includes(q) || r.email.toLowerCase().includes(q))
        : allRows;
      renderRows(filtered);
    });

    copyAllBtn.addEventListener('click', () => {
      const q = resultsSearch.value.trim().toLowerCase();
      const filtered = q
        ? allRows.filter(r => r.name.toLowerCase().includes(q) || r.email.toLowerCase().includes(q))
        : allRows;
      copyText(filtered.map(r => r.email).join('\n'));
      showToast('Copied ' + filtered.length + ' emails');
    });

    exportBtn.addEventListener('click', exportCsv);

    function renderResults(data) {
      const raw = Array.isArray(data) ? data : (data.results || []);

      allRows = raw.map(item => {
        if (item.Record) {
          const isValid = item.IsValid === true;
          return {
            name: item.Record.Name || '',
            email: item.Record.Email || '',
            isValid: isValid,
            status: isValid ? 'valid' : (item.Errors ? 'risky' : 'invalid')
          };
        }
        return {
          name: item.name || '',
          email: item.email || '',
          isValid: item.status === 'valid',
          status: item.status || 'invalid'
        };
      });

      resultsSearch.value = '';
      renderRows(allRows);
      results.classList.add('visible');
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    verifyBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) return;

      setLoading(true);
      errorMsg.classList.remove('visible');
      results.classList.remove('visible');

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('/verify', {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || `Server error: ${response.status}`);
        }

        const data = await response.json();
        renderResults(data);

      } catch (err) {
        showError('Verification failed: ' + err.message);
      } finally {
        setLoading(false);
      }
    });
  </script>

</body>

</html>
